<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Granite Bill Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400&display=swap" rel="stylesheet">

<style>

body{
background:#efefef;
padding:15px;
font-family:Arial;
}

.container{
background:white;
padding:20px;
max-width:650px;
width:95%;
margin:auto;
border-radius:6px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:18px;
background:#2d7be5;
border:none;
color:white;
cursor:pointer;
}

.bill{
margin-top:25px;
background:white;
padding:30px 20px;
font-family:'Kalam', cursive;
font-size:34px;
line-height:1.8;
position:relative;
}

.header{
display:flex;
justify-content:space-between;
position:relative;
margin-bottom:40px;
}

.center-title{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.value{
text-align:right;
min-width:220px;
}

.line{
border-bottom:3px solid black;
margin:20px auto;
width:60%;
}

.total{
text-align:center;
}

.highlight{
background:yellow;
padding:10px;
text-align:center;
}

.final{
font-size:44px;
font-weight:bold;
text-align:center;
border-top:3px solid black;
border-bottom:3px solid black;
display:inline-block;
padding:6px 20px;
margin-top:10px;
}

.center-block{
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>Granite Bill Calculator</h2>

<label>Customer Name</label>
<input id="customer">

<label>SFT</label>
<input id="sft" type="number">

<label>Rate</label>
<input id="rate" type="number">

<label>GST Value</label>
<input id="gstBase" type="number">

<label>Mining Quantity</label>
<input id="mining" type="number">

<label>Loading</label>
<input id="loading" type="number">

<label>RTGS</label>
<input id="rtgs" type="number">

<label>Previous Pending</label>
<input id="pending" type="number">

<button onclick="calculate()">Calculate</button>
<button onclick="downloadBill()">Download Bill Image</button>

<div id="bill" class="bill"></div>

</div>

<script>

function formatINR(num){
return num.toLocaleString('en-IN',{
minimumFractionDigits:2,
maximumFractionDigits:2
});
}

function calculate(){

let customer=document.getElementById("customer").value;

let sft=Number(document.getElementById("sft").value)||0;
let rate=Number(document.getElementById("rate").value)||0;
let gstBase=Number(document.getElementById("gstBase").value)||0;

let miningQty=Number(document.getElementById("mining").value)||0;
let loading=Number(document.getElementById("loading").value)||0;
let rtgs=Number(document.getElementById("rtgs").value)||0;
let pending=Number(document.getElementById("pending").value)||0;

let material=sft*rate;

let gst=Math.round(gstBase*0.18);

let mining=miningQty*7;

let total=Math.round(material+gst+mining+loading);

let balance=total-rtgs;

let finalAmount=Math.round(balance+pending);

document.getElementById("bill").innerHTML = `

<div class="header">

<div><u>Bill</u></div>

<div class="center-title"><u>శ్రీరామ Seven</u></div>

<div>${customer}</div>

</div>

<div class="row">
<div>${sft} × ${rate}</div>
<div class="value">= ${formatINR(material)} -</div>
</div>

<div class="row">
<div>18%</div>
<div class="value">= ${formatINR(gst)} -</div>
</div>

<div class="line"></div>

<div class="total">${formatINR(gstBase+gst)} -</div>

<br>

<div class="row">
<div>SFT = ${sft}</div>
<div class="value">= ${formatINR(material)} -</div>
</div>

<div class="row">
<div>GST 18%</div>
<div class="value">= ${formatINR(gst)} -</div>
</div>

<div class="row">
<div>M × ${miningQty} × 7</div>
<div class="value">= ${formatINR(mining)} -</div>
</div>

<div class="row">
<div>Loading</div>
<div class="value">= ${formatINR(loading)} -</div>
</div>

<div class="line"></div>

<div class="total">${formatINR(total)} -</div>

<br>

<div class="highlight">
RTGS - ${formatINR(rtgs)}
</div>

<div class="line"></div>

<div class="center-block">
<div class="final">${formatINR(finalAmount)}</div>
</div>

`;

}

function downloadBill(){

html2canvas(document.getElementById("bill"),{
scale:3
}).then(canvas=>{
let link=document.createElement("a");
link.download="granite_bill.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
</html>
