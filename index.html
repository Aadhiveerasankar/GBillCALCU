<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Granite Bill Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

body{
background:#efefef;
padding:20px;
font-family:Arial;
}

.container{
background:white;
padding:20px;
max-width:600px;
margin:auto;
border-radius:6px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:18px;
background:#2d7be5;
border:none;
color:white;
cursor:pointer;
}

.bill{
margin-top:25px;
background:white;
padding:40px;
font-family:'Patrick Hand', cursive;
font-size:30px;
line-height:1.8;
}

.header{
display:flex;
justify-content:space-between;
font-size:38px;
}

.title{
text-decoration:underline;
}

.center{
text-align:center;
}

.row{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.line{
border-bottom:3px solid black;
margin:14px 0;
}

.highlight{
background:yellow;
padding:5px 8px;
}

.final{
font-size:44px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Granite Bill Calculator</h2>

<label>Customer Name</label>
<input id="customer">

<label>SFT</label>
<input id="sft" type="number">

<label>Rate</label>
<input id="rate" type="number">

<label>GST Value</label>
<input id="gstBase" type="number">

<label>Mining Quantity</label>
<input id="mining" type="number">

<label>Loading</label>
<input id="loading" type="number">

<label>RTGS</label>
<input id="rtgs" type="number">

<label>Previous Pending</label>
<input id="pending" type="number">

<button onclick="calculate()">Calculate</button>
<button onclick="downloadBill()">Download Bill Image</button>

<div id="bill" class="bill"></div>

</div>

<script>

function formatINR(num){
return num.toLocaleString('en-IN',{
minimumFractionDigits:2,
maximumFractionDigits:2
});
}

function calculate(){

let customer=document.getElementById("customer").value;

let sft=Number(document.getElementById("sft").value) || 0;
let rate=Number(document.getElementById("rate").value) || 0;
let gstBase=Number(document.getElementById("gstBase").value) || 0;

let miningQty=Number(document.getElementById("mining").value) || 0;
let loading=Number(document.getElementById("loading").value) || 0;
let rtgs=Number(document.getElementById("rtgs").value) || 0;
let pending=Number(document.getElementById("pending").value) || 0;

let material=sft*rate;
let gst=gstBase*0.18;
let mining=miningQty*7;

let total=material+gst+mining+loading;
let balance=total-rtgs;
let finalAmount=balance+pending;

document.getElementById("bill").innerHTML = `

<div class="header">
<div class="title">Bill</div>
<div class="title">శ్రీరామ</div>
</div>

<br>

<div class="row">
<div>${sft} × ${rate}</div>
<div>= ${formatINR(material)}</div>
</div>

<div class="row">
<div>18%</div>
<div>= ${formatINR(gst)}</div>
</div>

<div class="line"></div>

<div class="center">${formatINR(gstBase + gst)}</div>

<br>

<div class="row">
<div>SFT = ${sft} × ${rate}</div>
<div>= ${formatINR(material)}</div>
</div>

<div class="row">
<div>GST 18%</div>
<div>= ${formatINR(gst)}</div>
</div>

<div class="row">
<div>M × ${miningQty} × 7</div>
<div>= ${formatINR(mining)}</div>
</div>

<div class="row">
<div>Loading</div>
<div>= ${formatINR(loading)}</div>
</div>

<div class="line"></div>

<div class="center">${formatINR(total)}</div>

<br>

<div class="highlight center">RTGS - ${formatINR(rtgs)}</div>

<div class="line"></div>

<div class="final">${formatINR(finalAmount)}</div>

`;

}

function downloadBill(){

html2canvas(document.getElementById("bill"),{
scale:3
}).then(canvas=>{
let link=document.createElement("a");
link.download="granite_bill.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
</html>
