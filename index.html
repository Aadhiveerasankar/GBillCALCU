<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Granite Bill Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

body{
background:#eaeaea;
padding:20px;
font-family:Arial;
}

.container{
background:white;
padding:20px;
max-width:520px;
margin:auto;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2d7be5;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

.bill{
margin-top:30px;
background:white;
padding:40px;
font-family:'Patrick Hand', cursive;
font-size:28px;
line-height:1.8;
}

.top{
position:relative;
text-align:center;
font-size:34px;
}

.customer{
position:absolute;
right:0;
top:0;
font-size:28px;
}

.line{
border-bottom:3px solid black;
width:300px;
margin:10px 0;
}

.total{
font-size:36px;
font-weight:bold;
}

.highlight{
background:yellow;
padding:4px;
}

</style>

</head>

<body>

<div class="container">

<h2>Granite Bill Calculator</h2>

<label>Customer Name</label>
<input id="customer">

<label>SFT</label>
<input id="sft" type="number">

<label>Rate</label>
<input id="rate" type="number">

<label>GST Value</label>
<input id="gstBase" type="number">

<label>Mining Quantity</label>
<input id="mining" type="number">

<label>Loading</label>
<input id="loading" type="number">

<label>RTGS</label>
<input id="rtgs" type="number">

<label>Previous Pending</label>
<input id="pending" type="number">

<button onclick="calculate()">Calculate</button>
<button onclick="downloadBill()">Download Bill Image</button>

<div id="bill" class="bill"></div>

</div>

<script>

function formatINR(num){
return num.toLocaleString('en-IN');
}

function calculate(){

let customer=document.getElementById("customer").value;

let sft=Number(document.getElementById("sft").value);
let rate=Number(document.getElementById("rate").value);

let gstBase=Number(document.getElementById("gstBase").value);

let miningQty=Number(document.getElementById("mining").value);
let loading=Number(document.getElementById("loading").value);
let rtgs=Number(document.getElementById("rtgs").value);
let pending=Number(document.getElementById("pending").value);

let material=sft*rate;

let gst=gstBase*0.18;

let mining=miningQty*7;

let total=material+gst+mining+loading;

let balance=total-rtgs;

let finalAmount=balance+pending;

document.getElementById("bill").innerHTML=`

<div class="top">
శ్రీరామ
<div class="customer">${customer}</div>
</div>

<br>

Bill

SFT = ${sft} × ${rate} = ${formatINR(material)}

GST 18% = ${formatINR(Math.round(gst))}

M × ${miningQty} × 7 = ${formatINR(mining)}

Loading = ${formatINR(loading)}

<div class="line"></div>

Total = ${formatINR(Math.round(total))}

<div class="highlight">RTGS = - ${formatINR(rtgs)}</div>

<div class="line"></div>

Balance = ${formatINR(Math.round(balance))}

Previous Pending = ${formatINR(pending)}

<div class="line"></div>

<div class="total">${formatINR(Math.round(finalAmount))}</div>

`;

}

function downloadBill(){

html2canvas(document.getElementById("bill")).then(canvas=>{
let link=document.createElement("a");
link.download="granite_bill.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
  </html>
