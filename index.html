<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Granite Bill Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

body{
background:#eaeaea;
padding:20px;
}

.container{
background:white;
padding:20px;
max-width:500px;
margin:auto;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2d7be5;
color:white;
border:none;
font-size:18px;
}

.bill{
margin-top:30px;
background:white;
padding:40px;
font-family:'Patrick Hand', cursive;
font-size:28px;
line-height:1.8;
}

.top{
display:flex;
justify-content:space-between;
font-size:32px;
}

.line{
border-bottom:3px solid black;
width:300px;
margin:10px 0;
}

.total{
font-size:36px;
font-weight:bold;
}

.highlight{
background:yellow;
padding:4px;
}

</style>

</head>

<body>

<div class="container">

<h2>Granite Bill Calculator</h2>

<label>SFT</label>
<input id="sft" type="number">

<label>Rate</label>
<input id="rate" type="number">

<label>Mining Quantity</label>
<input id="mining" type="number">

<label>Loading</label>
<input id="loading" type="number">

<label>RTGS</label>
<input id="rtgs" type="number">

<button onclick="calculate()">Calculate</button>
<button onclick="downloadBill()">Download Bill Image</button>

<div id="bill" class="bill"></div>

</div>

<script>

function calculate(){

let sft = Number(document.getElementById("sft").value);
let rate = Number(document.getElementById("rate").value);
let miningQty = Number(document.getElementById("mining").value);
let loading = Number(document.getElementById("loading").value);
let rtgs = Number(document.getElementById("rtgs").value);

let material = sft * rate;

let gst = material * 0.18;

let mining = miningQty * 7;

let total = material + gst + mining + loading;

let axis = total - rtgs;

document.getElementById("bill").innerHTML = `

<div class="top">
<div>Bill</div>
<div>శ్రీరామ</div>
</div>

<div>${sft} × ${rate} = ${material.toLocaleString()}</div>
<div>18% = ${gst.toLocaleString()}</div>

<div class="line"></div>

<div>SFT = ${sft} × ${rate} = ${material.toLocaleString()}</div>
<div>GST 18% = ${gst.toLocaleString()}</div>
<div>M × ${miningQty} × 7 = ${mining.toLocaleString()}</div>
<div>Loading = ${loading.toLocaleString()}</div>

<div class="line"></div>

<div>Total = ${total.toLocaleString()}</div>

<div class="highlight">RTGS = - ${rtgs.toLocaleString()}</div>

<div class="line"></div>

<div class="total">${axis.toLocaleString()}</div>

`;

}

function downloadBill(){

html2canvas(document.getElementById("bill")).then(canvas => {

let link = document.createElement("a");
link.download = "granite_bill.png";
link.href = canvas.toDataURL();
link.click();

});

}

</script>

</body>
</html>
