<!DOCTYPE html>
<html>
<head>
<title>Granite Bill Calculator</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

.container{
background:white;
padding:20px;
max-width:500px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#2c7be5;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#fafafa;
padding:15px;
border-radius:5px;
font-size:18px;
}

.highlight{
background:yellow;
font-weight:bold;
padding:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Granite Bill Calculator</h2>

<label>Customer Name</label>
<input id="customer">

<label>SFT</label>
<input id="sft">

<label>Rate</label>
<input id="rate">

<label>Mining</label>
<input id="mining">

<label>Loading</label>
<input id="loading">

<label>RTGS Amount</label>
<input id="rtgs">

<button onclick="calc()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calc(){

let customer = document.getElementById("customer").value;

let sft = Number(document.getElementById("sft").value);
let rate = Number(document.getElementById("rate").value);
let mining = Number(document.getElementById("mining").value);
let loading = Number(document.getElementById("loading").value);
let rtgs = Number(document.getElementById("rtgs").value);

let material = sft * rate;
let gst = material * 0.18;
let total = material + gst + mining + loading;
let axis = total - rtgs;

document.getElementById("result").innerHTML = `

Customer : <b>${customer}</b><br><br>

Material = ${material.toLocaleString()}<br>
GST (18%) = ${gst.toLocaleString()}<br>
Total = ${total.toLocaleString()}<br><br>

RTGS = ${rtgs.toLocaleString()}<br><br>

Axis Amount = <span class="highlight">${axis.toLocaleString()}</span>

`;

}

</script>

</body>
  </html>
