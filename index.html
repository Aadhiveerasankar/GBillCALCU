<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Granite Bill Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

body{
background:#f0f0f0;
font-family:Arial;
padding:20px;
}

.container{
background:white;
padding:20px;
max-width:550px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2d7be5;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

.bill{
margin-top:30px;
background:white;
padding:40px;
font-family:'Patrick Hand', cursive;
font-size:30px;
line-height:1.8;
}

.header{
text-align:center;
font-size:40px;
position:relative;
}

.customer{
position:absolute;
right:0;
top:0;
font-size:30px;
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.line{
border-bottom:3px solid black;
margin:15px 0;
}

.highlight{
background:yellow;
padding:5px;
}

.final{
font-size:50px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Granite Bill Calculator</h2>

<label>Customer Name</label>
<input id="customer">

<label>SFT</label>
<input id="sft" type="number">

<label>Rate</label>
<input id="rate" type="number">

<label>GST Value</label>
<input id="gstBase" type="number">

<label>Mining Quantity</label>
<input id="mining" type="number">

<label>Loading</label>
<input id="loading" type="number">

<label>RTGS</label>
<input id="rtgs" type="number">

<label>Previous Pending</label>
<input id="pending" type="number">

<button onclick="calculate()">Calculate</button>
<button onclick="downloadBill()">Download Bill Image</button>

<div id="bill" class="bill"></div>

</div>

<script>

function formatINR(num){
return num.toLocaleString('en-IN');
}

function calculate(){

let customer=document.getElementById("customer").value;

let sft=Number(document.getElementById("sft").value);
let rate=Number(document.getElementById("rate").value);

let gstBase=Number(document.getElementById("gstBase").value);

let miningQty=Number(document.getElementById("mining").value);
let loading=Number(document.getElementById("loading").value);
let rtgs=Number(document.getElementById("rtgs").value);
let pending=Number(document.getElementById("pending").value);

let material=sft*rate;

let gst=gstBase*0.18;

let mining=miningQty*7;

let total=material+gst+mining+loading;

let balance=total-rtgs;

let finalAmount=balance+pending;

document.getElementById("bill").innerHTML=`

<div class="header">
శ్రీరామ
<div class="customer">${customer}</div>
</div>

<br>

<div class="row">
<div>SFT</div>
<div>${sft} × ${rate}</div>
<div>${formatINR(material)}</div>
</div>

<div class="row">
<div>GST 18%</div>
<div></div>
<div>${formatINR(Math.round(gst))}</div>
</div>

<div class="row">
<div>M</div>
<div>${miningQty} × 7</div>
<div>${formatINR(mining)}</div>
</div>

<div class="row">
<div>Loading</div>
<div></div>
<div>${formatINR(loading)}</div>
</div>

<div class="line"></div>

<div class="row">
<div>Total</div>
<div></div>
<div>${formatINR(Math.round(total))}</div>
</div>

<div class="row highlight">
<div>RTGS</div>
<div></div>
<div>- ${formatINR(rtgs)}</div>
</div>

<div class="line"></div>

<div class="row">
<div>Balance</div>
<div></div>
<div>${formatINR(Math.round(balance))}</div>
</div>

<div class="row">
<div>Previous Pending</div>
<div></div>
<div>${formatINR(pending)}</div>
</div>

<div class="line"></div>

<div class="final">${formatINR(Math.round(finalAmount))}</div>

`;

}

function downloadBill(){

html2canvas(document.getElementById("bill")).then(canvas=>{
let link=document.createElement("a");
link.download="granite_bill.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
</html>
